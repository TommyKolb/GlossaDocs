name: Font catalogs

on:
  workflow_call:
  workflow_dispatch:

jobs:
  match:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend and backend font families must match
        run: node scripts/check-font-catalogs.mjs
