name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    env:
      CDK_DEFAULT_ACCOUNT: "111111111111"
      CDK_DEFAULT_REGION: us-east-1
      GLOSSADOCS_GITHUB_OWNER: example
      GLOSSADOCS_GITHUB_REPOSITORY: glossadocs
      GLOSSADOCS_GITHUB_TOKEN_SECRET_ARN: arn:aws:secretsmanager:us-east-1:111111111111:secret:github-token
      GLOSSADOCS_BACKEND_CORS_ORIGIN: https://main.example.amplifyapp.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            infrastructure/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Install infrastructure dependencies
        run: npm --prefix infrastructure ci

      - name: Frontend and backend test suite
        run: npm test

      - name: Backend typecheck
        run: npm --prefix backend run typecheck

      - name: Infrastructure checks
        run: npm --prefix infrastructure run typecheck && npm --prefix infrastructure run lint && npm --prefix infrastructure run test && npm --prefix infrastructure run build && npm --prefix infrastructure run synth

      - name: Lambda package build validation
        run: npm --prefix backend run build:lambda && npm --prefix backend run package:lambda

  deploy-infrastructure:
    runs-on: ubuntu-latest
    needs: quality-gates
    environment: production
    env:
      CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
      CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
      GLOSSADOCS_GITHUB_OWNER: ${{ vars.GLOSSADOCS_GITHUB_OWNER }}
      GLOSSADOCS_GITHUB_REPOSITORY: ${{ vars.GLOSSADOCS_GITHUB_REPOSITORY }}
      GLOSSADOCS_GITHUB_TOKEN_SECRET_ARN: ${{ vars.GLOSSADOCS_GITHUB_TOKEN_SECRET_ARN }}
      GLOSSADOCS_BACKEND_CORS_ORIGIN: ${{ vars.GLOSSADOCS_BACKEND_CORS_ORIGIN }}
      GLOSSADOCS_ENABLE_WAF: ${{ vars.GLOSSADOCS_ENABLE_WAF }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required deployment configuration
        run: |
          test -n "${{ vars.AWS_ACCOUNT_ID }}"
          test -n "${{ vars.AWS_REGION }}"
          test -n "${{ vars.GLOSSADOCS_GITHUB_OWNER }}"
          test -n "${{ vars.GLOSSADOCS_GITHUB_REPOSITORY }}"
          test -n "${{ vars.GLOSSADOCS_GITHUB_TOKEN_SECRET_ARN }}"
          test -n "${{ vars.GLOSSADOCS_BACKEND_CORS_ORIGIN }}"
          test -n "${{ vars.PROD_API_BASE_URL }}"
          test -n "${{ secrets.DEPLOY_AWS_ROLE_ARN }}"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: infrastructure/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEPLOY_AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install infrastructure dependencies
        run: npm --prefix infrastructure ci

      - name: Deploy infrastructure
        run: npm --prefix infrastructure run build && npm --prefix infrastructure run deploy

  migrate-database:
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEPLOY_AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve migration runner resources
        run: |
          STACK_NAME="GlossaDocsPublicStack"
          MIGRATION_PROJECT_NAME=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='MigrationProjectName'].OutputValue | [0]" --output text)
          MIGRATION_SOURCE_BUCKET_NAME=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='MigrationSourceBucketName'].OutputValue | [0]" --output text)
          AMPLIFY_APP_ID=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='AmplifyAppId'].OutputValue | [0]" --output text)
          test "$MIGRATION_PROJECT_NAME" != "None"
          test "$MIGRATION_SOURCE_BUCKET_NAME" != "None"
          test "$AMPLIFY_APP_ID" != "None"
          echo "MIGRATION_PROJECT_NAME=$MIGRATION_PROJECT_NAME" >> "$GITHUB_ENV"
          echo "MIGRATION_SOURCE_BUCKET_NAME=$MIGRATION_SOURCE_BUCKET_NAME" >> "$GITHUB_ENV"
          echo "AMPLIFY_APP_ID=$AMPLIFY_APP_ID" >> "$GITHUB_ENV"

      - name: Package migration source bundle
        run: |
          zip -qr migration-source.zip backend

      - name: Upload migration source bundle to S3
        run: |
          BUNDLE_KEY="migrations/${GITHUB_SHA}.zip"
          aws s3 cp migration-source.zip "s3://${MIGRATION_SOURCE_BUCKET_NAME}/${BUNDLE_KEY}"
          echo "MIGRATION_SOURCE_KEY=$BUNDLE_KEY" >> "$GITHUB_ENV"

      - name: Run migrations in VPC CodeBuild project
        run: |
          BUILD_ID=$(aws codebuild start-build --project-name "$MIGRATION_PROJECT_NAME" --source-type-override S3 --source-location-override "${MIGRATION_SOURCE_BUCKET_NAME}/${MIGRATION_SOURCE_KEY}" --query "build.id" --output text)
          echo "Started migration build: $BUILD_ID"
          LOG_URL=$(aws codebuild batch-get-builds --ids "$BUILD_ID" --query "builds[0].logs.deepLink" --output text)
          echo "Migration build logs: $LOG_URL"
          while true; do
            STATUS=$(aws codebuild batch-get-builds --ids "$BUILD_ID" --query "builds[0].buildStatus" --output text)
            echo "Migration build status: $STATUS"
            if [ "$STATUS" = "SUCCEEDED" ]; then
              break
            fi
            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "FAULT" ] || [ "$STATUS" = "STOPPED" ] || [ "$STATUS" = "TIMED_OUT" ]; then
              echo "Migration build failed with status $STATUS"
              exit 1
            fi
            sleep 15
          done

  deploy-application:
    runs-on: ubuntu-latest
    needs: migrate-database
    environment: production
    env:
      CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
      CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
      GLOSSADOCS_GITHUB_OWNER: ${{ vars.GLOSSADOCS_GITHUB_OWNER }}
      GLOSSADOCS_GITHUB_REPOSITORY: ${{ vars.GLOSSADOCS_GITHUB_REPOSITORY }}
      GLOSSADOCS_GITHUB_TOKEN_SECRET_ARN: ${{ vars.GLOSSADOCS_GITHUB_TOKEN_SECRET_ARN }}
      GLOSSADOCS_BACKEND_CORS_ORIGIN: ${{ vars.GLOSSADOCS_BACKEND_CORS_ORIGIN }}
      GLOSSADOCS_ENABLE_WAF: ${{ vars.GLOSSADOCS_ENABLE_WAF }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            infrastructure/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEPLOY_AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install dependencies
        run: npm --prefix backend ci && npm --prefix infrastructure ci

      - name: Package Lambda artifact
        run: npm --prefix backend run build:lambda && npm --prefix backend run package:lambda

      - name: Deploy API and Lambda after migration gate
        run: npm --prefix infrastructure run build && npm --prefix infrastructure run deploy

      - name: Trigger Amplify production build
        run: |
          STACK_NAME="GlossaDocsPublicStack"
          APP_ID=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='AmplifyAppId'].OutputValue | [0]" --output text)
          test "$APP_ID" != "None"
          aws amplify start-job --app-id "$APP_ID" --branch-name main --job-type RELEASE

  smoke-tests:
    runs-on: ubuntu-latest
    needs: deploy-application
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: API smoke tests
        env:
          API_BASE_URL: ${{ vars.PROD_API_BASE_URL }}
        run: node scripts/smoke-test.mjs
