name: Deployed integration tests

on:
  push:
  pull_request:

jobs:
  deployed-integration-tests:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run deployed integration tests
        env:
          CI: true
          PROD_API_BASE_URL: ${{ vars.PROD_API_BASE_URL }}
          PROD_FRONTEND_URL: ${{ vars.PROD_FRONTEND_URL }}
          E2E_PROD_EMAIL: ${{ secrets.E2E_PROD_EMAIL }}
          E2E_PROD_PASSWORD: ${{ secrets.E2E_PROD_PASSWORD }}
        run: npm run test:deployed
