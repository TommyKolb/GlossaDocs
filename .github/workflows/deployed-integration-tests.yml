# `deployment: false` on the environment: loads GitHub Environment secrets/vars (e.g. Production) without
# creating a deployment record. See: https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#example-using-an-environment-without-creating-a-deployment
name: Deployed integration tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: deployed-integration-prod
  cancel-in-progress: false

jobs:
  deployed-integration-tests:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    environment:
      name: Production
      deployment: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      PROD_API_BASE_URL: ${{ vars.PROD_API_BASE_URL || secrets.PROD_API_BASE_URL }}
      PROD_FRONTEND_URL: ${{ vars.PROD_FRONTEND_URL || secrets.PROD_FRONTEND_URL }}
      E2E_PROD_EMAIL: ${{ secrets.E2E_PROD_EMAIL || vars.E2E_PROD_EMAIL }}
      E2E_PROD_PASSWORD: ${{ secrets.E2E_PROD_PASSWORD || vars.E2E_PROD_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Validate required deployed test inputs
        shell: bash
        run: |
          required_vars=(PROD_API_BASE_URL PROD_FRONTEND_URL E2E_PROD_EMAIL E2E_PROD_PASSWORD)
          missing=()

          for name in "${required_vars[@]}"; do
            value="$(printf '%s' "${!name}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            if [ -z "$value" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required variables/secrets: ${missing[*]}"
            echo "Set PROD_API_BASE_URL, PROD_FRONTEND_URL, E2E_PROD_EMAIL, and E2E_PROD_PASSWORD on the GitHub \"Production\" environment (or as repo/org variables and secrets). This job uses the environment with deployment: false, so it does not create a deployment object."
            exit 1
          fi

      - name: Run deployed integration tests
        run: npm run test:deployed
