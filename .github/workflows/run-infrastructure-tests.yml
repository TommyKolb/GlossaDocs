name: Infrastructure tests

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    env:
      CDK_DEFAULT_ACCOUNT: "111111111111"
      CDK_DEFAULT_REGION: us-east-1
      GLOSSADOCS_GITHUB_OWNER: example
      GLOSSADOCS_GITHUB_REPOSITORY: glossadocs
      GLOSSADOCS_GITHUB_TOKEN_SECRET_ARN: arn:aws:secretsmanager:us-east-1:111111111111:secret:github-token
      GLOSSADOCS_BACKEND_CORS_ORIGIN: https://main.example.amplifyapp.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: infrastructure/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: CDK assertion tests
        run: npm run test

      - name: CDK synth
        run: npm run build && npm run synth

      - name: Configure AWS credentials for CDK diff (PRs only, optional)
        if: github.event_name == 'pull_request' && vars.DEPLOY_AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEPLOY_AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: CDK diff against AWS (PRs only, optional)
        if: github.event_name == 'pull_request' && vars.DEPLOY_AWS_ROLE_ARN != ''
        env:
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID || '111111111111' }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          GLOSSADOCS_GITHUB_OWNER: ${{ vars.GLOSSADOCS_GITHUB_OWNER || 'example' }}
          GLOSSADOCS_GITHUB_REPOSITORY: ${{ vars.GLOSSADOCS_GITHUB_REPOSITORY || 'glossadocs' }}
          GLOSSADOCS_GITHUB_TOKEN_SECRET_ARN: ${{ vars.GLOSSADOCS_GITHUB_TOKEN_SECRET_ARN || 'arn:aws:secretsmanager:us-east-1:111111111111:secret:github-token' }}
          GLOSSADOCS_BACKEND_CORS_ORIGIN: ${{ vars.GLOSSADOCS_BACKEND_CORS_ORIGIN || 'https://main.example.amplifyapp.com' }}
        run: npm run diff -- --no-lookups
