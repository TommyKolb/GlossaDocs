services:
  postgres:
    image: postgres:16-alpine
    container_name: glossadocs-postgres
    environment:
      POSTGRES_DB: glossadocs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d glossadocs"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: glossadocs-keycloak
    command: ["start-dev", "--import-realm"]
    depends_on:
      mailpit:
        condition: service_started
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

  mailpit:
    image: axllent/mailpit:latest
    container_name: glossadocs-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glossadocs-backend
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      NODE_ENV: development
      API_PORT: 4000
      CORS_ALLOWED_ORIGINS: "*"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/glossadocs
      OIDC_ISSUER_URL: http://localhost:8080/realms/glossadocs
      OIDC_AUDIENCE: glossadocs-api
      OIDC_JWKS_URL: http://keycloak:8080/realms/glossadocs/protocol/openid-connect/certs
      OIDC_PUBLIC_ISSUER_URL: http://localhost:8080/realms/glossadocs
      OIDC_PUBLIC_CLIENT_ID: glossadocs-api
      OIDC_PUBLIC_REDIRECT_URI: http://localhost:5173/
      KEYCLOAK_ADMIN_URL: http://keycloak:8080
      KEYCLOAK_REALM: glossadocs
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: sh -c "npx node-pg-migrate -m migrations up && node dist/server.js"
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://localhost:4000
    container_name: glossadocs-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  postgres_data:

